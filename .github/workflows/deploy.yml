name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a newer run cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static build (Nuxt generate)
        env:
          # Project sites live at https://<user>.github.io/<repo>/ — Nuxt needs
          # that subpath as its base URL so links and assets resolve correctly.
          # Derived from the repo name; override here if you use a custom domain
          # (set NUXT_APP_BASE_URL: / for a custom domain or <user>.github.io repo).
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
        run: pnpm generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
